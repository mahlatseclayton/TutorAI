<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor page</title>
        <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="circles"></div>
    <div class="circles"></div>
    <div class="circles"></div>
    <div class="circles"></div>
    <div class="circles"></div>
    <div class="circles"></div>
  <main id="tutorMain">
      <header class="appBar">
        <div class="lCon">
        <img class="cLogo" src="images/tlogo.jpeg"></img>
        <h1 class="appTitle">Tutor<span class="aiHandle">AI</span></h1>
        </div>
        
           <nav class="navBar">
                <image id="account" src="images/account.png"></image>
            <a class="navItem" href="Account.html">Account</a>
                <image id="account" src="images/home.png"></image>
            <a  class="navItem" href="index.html">Home</a>
        </nav>
    </header>
<div id="tSection">
  <section id="tutorSection">
    <div class="heroText">
      <h2>Build Your Personalized Learning Session</h2>
      <p>Learn smarter with structured explanations tailored to your level.</p>
    </div>

    <form id="tutorForm">

      <div class="inputGroup">
        <label for="gradeId">Grade</label>
        <input type="number" id="gradeId" placeholder="e.g. 10" min="1" max="12" required>
      </div>

      <div class="inputGroup">
        <label for="subjectId">Subject</label>
        <select id="subjectId" required>
          <option value="">Select Subject</option>
          <option>Mathematics</option>
          <option>Economics</option>
          <option>Accounting</option>
          <option>Life Science</option>
          <option>Geography</option>
          <option>Life Orientation</option>
          <option>History</option>
          <option>Mathematical Literacy</option>
        </select>
      </div>

      <div class="inputGroup">
        <label for="topicId">Topic</label>
        <input type="text" id="topicId" placeholder="Enter topic (e.g. Trigonometry)" required>
      </div>

      <div class="inputGroup">
        <label for="levelId">Difficulty Level</label>
        <select id="levelId" required>
          <option value="">Select Level</option>
          <option>Beginner</option>
          <option>Intermediate</option>
          <option>Advanced</option>
        </select>
      </div>

      <button type="submit"  id="startedBtn" class="btn">Start Learning</button>

    </form>
  </section>
  </div>

</main>
</body>
<script src="script.js"></script>
<script type="module" src="firebase.js"></script>
</html>
