<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor page</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" href="data:,">
</head>
<body>
    <div class="circles"></div>
    <div class="circles"></div>
    <div class="circles"></div>
    <div class="circles"></div>
    <div class="circles"></div>
    <div class="circles"></div>
  <main id="tutorMain">
        <header class="appBar">
            <div class="lCon">
                <img class="cLogo" src="images/tlogo.jpeg" alt="Logo">
                <h1 class="appTitle">Tutor<span class="aiHandle">AI</span></h1>
            </div>
            
            <nav class="navBar">
                <a class="navItem active" href="mainPage.html"><i class="fas fa-th-large"></i> Dashboard</a>
                <a class="navItem" href="scanSolve.html"><i class="fas fa-camera"></i> Scan & Solve</a>
                <a class="navItem" href="Account.html"><i class="fas fa-user-circle"></i> Account</a>
            </nav>

            <div class="headerActions">
                <button id="themeToggle" class="themeToggleBtn" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <div id="tSection">
          <section id="tutorSection">
            <div class="heroText">
              <h2>Build Your Personalized Learning Session</h2>
              <p>Learn smarter with structured explanations tailored to your level.</p>
              
              <div style="margin-top: 25px; display: flex; gap: 15px; justify-content: center;">
                <button onclick="document.getElementById('tutorForm').scrollIntoView({behavior:'smooth'})" class="btn" style="background: white; color: #4338ca; border: 2px solid #4338ca;">
                  <i class="fas fa-book-open"></i> Explore Topics
                </button>
              </div>
            </div>

    <form id="tutorForm">

      <div class="inputGroup">
        <label for="gradeId">Grade</label>
        <input type="number" id="gradeId" placeholder="e.g. 10" min="1" max="12" required>
      </div>

      <div class="inputGroup">
        <label for="subjectId">Subject</label>
        <select id="subjectId" required>
          <option value="">Select Subject</option>
          <option>Mathematics</option>
          <option>Economics</option>
          <option>Accounting</option>
          <option>Life Science</option>
          <option>Geography</option>
          <option>Life Orientation</option>
          <option>History</option>
          <option>Mathematical Literacy</option>
        </select>
      </div>

      <div class="inputGroup">
        <label for="topicId">Topic</label>
        <input type="text" id="topicId" placeholder="Enter topic (e.g. Trigonometry)" required>
      </div>

      <div class="inputGroup">
        <label for="levelId">Difficulty Level</label>
        <select id="levelId" required>
          <option value="">Select Level</option>
          <option>Beginner</option>
          <option>Intermediate</option>
          <option>Advanced</option>
        </select>
      </div>

       <button  id="startedBtn" class="btn">Start Learning</button>
      <!-- <button type="button"  id="startedBtn" class="btn">Start Learning</button> -->

    </form>
  </section>
  </div>

</main>

  <!-- Loader Overlay -->
  <div id="loaderOverlay">
    <div class="spinner"></div>
    <h3 style="margin-top: 20px; color: #1f2937; font-weight: 700;">Crafting your learning session...</h3>
  </div>

</body>
<script src="script.js"></script>
<script type="module" src="firebase.js"></script>
</html>
