<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - MzansiEd</title>
    <link rel="icon" type="image/jpeg" href="images/tlogo.jpeg">
    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Outfit', sans-serif !important;">
    <div class="circles"></div>
    <div class="circles"></div>
    <div class="circles"></div>
    
    <main>
        <header class="appBar">
    <!-- Left: Logo + Title -->
    <div class="lCon">
        <img class="cLogo" src="images/tlogo.jpeg" alt="Logo">
        <h1 class="appTitle">Mzansi<span style="color: #ef4444;">Ed</span></h1>
    </div>

    <!-- Right: Home + Theme -->
    <div class="headerActions">
        <a class="navItem" href="index.html">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <button id="themeToggle" class="themeToggleBtn" title="Toggle Theme">
            <i class="fas fa-moon"></i>
        </button>
    </div>
</header>

       <section id="mainSection" style="margin-top: 0vh;">
           <div class="authCard">
                <h2 class="authTitle" style="margin-top: 0 ">Sign In</h2>
                
                <form id="signInForm" class="authForm">
                    <input type="email" id="email" class="authInput" placeholder="Enter your email" autocomplete="username" required>

                   <div class="password-container">
                    <input type="password" id="password" class="authInput" placeholder="Enter your password" autocomplete="current-password" required>
                    <span class="toggle-password" tabindex="0" role="button" aria-label="Toggle password visibility">
                        <i class="fas fa-eye"></i>
                    </span>
                   </div>
                    
                    <div class="authLinks">
                        <a href="#" id="forgotBtn">Forgot password?</a>
                        <a href="#" id="resendBtn">Resend Verification?</a>
                        <a href="signUp.html">Create account</a>
                    </div>
                    
                    <button id="signInBtn" class="authBtn" type="submit">Sign In <i class="fas fa-sign-in-alt" style="margin-left: 10px;"></i></button>
                </form>
            </div>
 

            <!--Google/Apple -->
           <div class="socialLogin">
    <p class="socialText">Or sign in with</p>
    <div class="socialBtnsRow">
        <button id="googleSignInBtn" class="socialBtn googleBtn">
            <img src="images/google.png" alt="Google Logo" class="socialLogo">
             Google
        </button>
    </div>
</div>
        </section>
    </main>

    <script src="js/script.js"></script>
    <script type="module" src="js/firebase.js"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=6LcLg7ksAAAAAOUdsc6hoOd75Jw0hSrG-WJQs12b"></script>
</body>
</html>
