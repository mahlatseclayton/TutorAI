        <form class="signupform">
            <input id="name" class="username" type="text" placeholder="Name(s)" required>
            <input id="email" class="useremail" type="email" placeholder="Email" required>
            <input id="grade" class="grade" type="number" placeholder="Grade" required>
            
            <input id="password" class="userpassword" type="password" placeholder="Password" required>
            <input id="cpassword" class="userpassword" type="password" placeholder="Confirm Password" required>

            <div class="formLinks">
                <a href="signIn.html" class="forgotPassword"><b>Already have an account?</b></a>

            </div>

            <button onclick="signUp()" class="signupbtn" type="submit">Create</button>
        </form>
