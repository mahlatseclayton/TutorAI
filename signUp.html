<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - MzansiEd</title>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Outfit', sans-serif !important;">
    <div class="circles"></div>
    <div class="circles"></div>
    <div class="circles"></div>
    
    <main>
        <header class="appBar">
            <div class="lCon">
                <img class="cLogo" src="images/tlogo.jpeg" alt="Logo">
                <h1 class="appTitle">Mzansi<span style="color: #ef4444;">Ed</span></h1>
            </div>
            
            <nav class="navBar">
                <a class="navItem" href="index.html"><i class="fas fa-home"></i> Home</a>
            </nav>

            <div class="headerActions">
                <button id="themeToggle" class="themeToggleBtn" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <section id="mainSection" style="padding-top: 5vh;">
            <div class="authCard">
                <h2 class="authTitle">Get Started</h2>
                
                <form id="signUpForm" class="authForm">
                    <input id="name" class="authInput" type="text" placeholder="Full Name(s)" required>
                    <input id="email" class="authInput" type="email" placeholder="Email Address" required>
                    <input id="grade" class="authInput" type="number" placeholder="Your Grade" required>
                    <input id="password" class="authInput" type="password" placeholder="Create Password" required minlength="6">
                    <input id="cpassword" class="authInput" type="password" placeholder="Confirm Password" required minlength="6">

                    <div class="authLinks">
                        <a href="signIn.html">Already have an account? Sign In</a>
                    </div>
                    
                    <button id="signUpBtn" class="authBtn" type="submit">Create Account <i class="fas fa-user-plus" style="margin-left: 10px;"></i></button>
                </form>
            </div>
        </section>
    </main>

    <script type="module" src="firebase.js"></script>
</body>
</html>
