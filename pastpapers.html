<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Past Papers - TutorAI</title>
  <link rel="stylesheet" href="styles.css">

   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <script src="theme.js" defer></script>

</head>
<body>
  <!-- App Header -->
  <header class="appBar">
    <div class="lCon">
      <img class="cLogo" src="images/tlogo.jpeg" alt="Logo">
      <h1 class="appTitle">Tutor<span class="aiHandle">AI</span></h1>
    </div>
    
    <nav class="navBar">
      <a class="navItem" href="mainPage.html"><i class="fas fa-th-large"></i> Dashboard</a>
      <a class="navItem" href="scanSolve.html"><i class="fas fa-camera"></i> Scan & Solve</a>
      <a class="navItem" href="Account.html"><i class="fas fa-user-circle"></i> Account</a>
    </nav>

    <div class="headerActions">
      <div id="pointsDisplay" class="pointsBadge">
        <i class="fas fa-star"></i> <span id="userPoints">0</span> pts
      </div>
      <button id="pdfBtn" class="themeToggleBtn" title="Export as PDF" style="font-size: 1rem;">
        <i class="fas fa-file-pdf"></i>
      </button>
      <button id="themeToggle" class="themeToggleBtn" title="Toggle Theme">
        <i class="fas fa-moon"></i>
      </button>
      <button id="masteredBtn" class="actionBtn masteredBtn" style="margin-left: 10px;">
        <i class="fas fa-check-double"></i> Mastered
      </button>
    </div>
  </header>

  <!-- Past Papers Section -->
  <section class="contentCard" id="pastPapersSection">
    <div class="section-header">
      <h2 class="section-title">
        <i class="fas fa-file-alt"></i> Past Papers
      </h2>
      <span id="pastPapersCount" style="font-size:0.85rem; color:var(--text-muted); font-weight:600;"></span>
    </div>
    <div id="pastPapersList">
      <!-- Loading skeleton -->
      <div style="display:flex; flex-direction:column; gap:10px;">
        <div class="skeleton skel-line" style="height:62px; border-radius:14px;"></div>
        <div class="skeleton skel-line" style="height:62px; border-radius:14px;"></div>
        <div class="skeleton skel-line" style="height:62px; border-radius:14px;"></div>
      </div>
    </div>
  </section>
</body>

<script src="script.js" defer></script>
<script type="module" src="firebase.js"></script>
</html>
